api:
  build:
    context: .
    dockerfile: Dockerfile
  image: sikassarangan-backend:latest
  container_name: sikassarangan-api
  restart: unless-stopped
  ports:
    - "443:443"
  environment:
    - NODE_ENV=production
    - APP_NAME=siKasSarangan
    - DATABASE_URL=${DATABASE_URL}
    - REDIS_HOST=${REDIS_HOST}
    - REDIS_PORT=${REDIS_PORT}
    - REDIS_PASSWORD=${REDIS_PASSWORD}
    - API_HOST=0.0.0.0
    - API_PORT=${API_PORT}
    - API_KEY=${API_KEY}
    - CORS_ORIGIN=${CORS_ORIGIN:-*}
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:443/health"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 30s
  networks:
    - sikassarangan-net