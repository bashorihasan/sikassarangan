services:
  db:
    image: postgres:16
    container_name: sikassarangan-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:5433:5432"     # ← diubah, host pakai 5433
    volumes:
      - sikassarangan_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sikassarangan-net

  redis:
    image: redis:7-alpine
    container_name: sikassarangan-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6380:6379"     # ← diubah, host pakai 6380
    volumes:
      - sikassarangan_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sikassarangan-net

  api:
    build: .
    container_name: sikassarangan-api
    restart: unless-stopped
    env_file: .env
    ports:
      - "${API_PORT}:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sikassarangan-net

volumes:
  sikassarangan_pgdata:
  sikassarangan_redisdata:

networks:
  sikassarangan-net:
    name: sikassarangan-net